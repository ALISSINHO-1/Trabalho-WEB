<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Auto Gallery</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="header-main">
        <h1>DRIVE<span>ELITE</span></h1>
        <p>Coleção Exclusiva de Performance e Design</p>
    </header>

    <main class="galeria-container">
        <div class="galeria-item">
            <input type="checkbox" id="carro1" class="zoom-toggle">
            <label for="carro1">
                <figure>
                    <img src="https://s2-autoesporte.glbimg.com/7zEgQqC1XoFgADHmNYotU3yLa6Q=/0x0:620x400/984x0/smart/filters:strip_icc()/i.s3.glbimg.com/v1/AUTH_cf9d035bf26b4646b105bd958f32089d/internal_photos/bs/2020/b/r/biZvzdQ5WYjBFzKkJo4w/2015-10-05-mitsubishi-lancer-evolution-final-edition-10.jpg" alt="Mitsubishi Lancer Evolution">
                    <figcaption>Mitsubishi - Lancer Evolution</figcaption>
                </figure>
            </label>
        </div>

        <div class="galeria-item">
            <input type="checkbox" id="carro2" class="zoom-toggle">
            <label for="carro2">
                <figure>
                    <img src="https://images2.bonhams.com/image?src=Images/live/2019-01/28/24841684-1-40.jpg" alt="Nissan Skyline 2000 GT-R">
                    <figcaption>Nissan - Skyline 2000 GT-R</figcaption>
                </figure>
            </label>
        </div>

        <div class="galeria-item">
            <input type="checkbox" id="carro3" class="zoom-toggle">
            <label for="carro3">
                <figure>
                    <img src="https://upload.wikimedia.org/wikipedia/commons/e/ea/Corvette-je-1958.jpg" alt="Chevrolet Corvette">
                    <figcaption>Chevrolet - Corvette 1958</figcaption>
                </figure>
            </label>
        </div>

        <div class="galeria-item">
            <input type="checkbox" id="carro4" class="zoom-toggle">
            <label for="carro4">
                <figure>
                    <img src="https://live.staticflickr.com/3729/9475006095_e56b120eb2_b.jpg" alt="Chevrolet Camaro">
                    <figcaption>Chevrolet - Camaro 2013</figcaption>
                </figure>
            </label>
        </div>

        <div class="galeria-item">
            <input type="checkbox" id="carro5" class="zoom-toggle">
            <label for="carro5">
                <figure>
                    <img src="https://cdn.motor1.com/images/mgl/VzMq0z/s1/bugatti-chiron-1500.jpg" alt="Bugatti Chiron">
                    <figcaption>Bugatti - Chiron</figcaption>
                </figure>
            </label>
        </div>

        <div class="galeria-item">
            <input type="checkbox" id="carro6" class="zoom-toggle">
            <label for="carro6">
                <figure>
                    <img src="https://wallpapers.com/images/hd/1969-dodge-charger-pictures-fu5xbhpevmtoli4m.jpg" alt="Dodge Charger ">
                    <figcaption>Dodge - Charger 1969</figcaption>
                </figure>
            </label>
        </div>
    </main>

</body>
</html>
